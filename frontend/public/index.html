<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productivity App</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    };
  </script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 shrink-0 bg-white dark:bg-gray-800 shadow-md flex flex-col">
    <div class="p-5 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
      <span class="text-lg font-bold tracking-tight">📚 ProductivityApp</span>
      <button id="dark-toggle" title="Toggle dark mode"
        class="text-gray-500 hover:text-gray-900 dark:hover:text-white transition">🌙</button>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="#/" data-route="/" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">🏠 Dashboard</a>
      <a href="#/tasks" data-route="/tasks" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">✅ Tasks</a>
      <a href="#/notes" data-route="/notes" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">📝 Notes</a>
      <a href="#/flashcards" data-route="/flashcards" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">🃏 Flashcards</a>
      <a href="#/language" data-route="/language" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">🌐 Language</a>
      <a href="#/analytics" data-route="/analytics" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">📊 Analytics</a>
      <a href="#/settings" data-route="/settings" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">⚙️ Settings</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto">
    <div id="app" class="p-6 max-w-7xl mx-auto"></div>
  </main>

  <!-- Toast notification container -->
  <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <!-- Scripts as ES modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
